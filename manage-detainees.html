<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Detainees - BJMP Admin</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/super admin.png" alt="Logo" class="logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="nav-menu">
                <a href="admin-dashboard.html" class="nav-link"><span>📊</span> Dashboard</a>
                <a href="visitor-list.html" class="nav-link"><span>📅</span> Manage Visitors</a>
                <a href="manage-officers.html" class="nav-link"><span>👥</span> Manage Officers</a>
                <a href="manage-detainees.html" class="nav-link active"><span>🔒</span> Manage Individuals</a>
                <a href="system-reports.html" class="nav-link"><span>📈</span> Reports</a>
                
            </nav>
            <form action="logout.php" method="POST" class="logout-form">
                <button type="submit" class="logout-btn"><span>🚪</span> Logout</button>
            </form>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Manage Individuals</h1>
            </header>

            <div id="alertContainer"></div>

            <!-- Add Detainee Form -->
            <div class="content-card">
                <h2>Add New Individual</h2>
                <form id="addDetaineeForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>PDL's Number <span class="required">*</span></label>
                            <input type="text" name="detainee_number" required placeholder="e.g. D-2023-001">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select name="status">
                                <option value="active">Active</option>
                                <option value="transferred">Transferred</option>
                                <option value="released">Released</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name <span class="required">*</span></label>
                            <input type="text" name="first_name" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name <span class="required">*</span></label>
                            <input type="text" name="last_name" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Middle Name</label>
                            <input type="text" name="middle_name">
                        </div>
                        <div class="form-group">
                            <label>Date of Birth <span class="required">*</span></label>
                            <input type="date" name="date_of_birth" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Information</button>
                </form>
            </div>

            <!-- Detainee List -->
            <div class="content-card">
                <h2>PDL's List</h2>
                <table class="data-table" id="detaineesTable">
                    <thead>
                        <tr>
                            <th>Number</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="manage-detainees-script.js?v=1.0"></script>
</body>
</html>
