<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Dashboard - BJMP System</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Officer Panel</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link active"><span>📊</span> Dashboard</a>
                <a href="add-visitor.html" class="nav-link"><span>➕</span> Log Visitor</a>
                <a href="visitorlist_officer.html" class="nav-link"><span>📋</span> Manage Visitors</a>
            </nav>
            <form action="logout.php" method="POST" class="logout-form">
                <button type="submit" class="logout-btn"><span>🚪</span> Logout</button>
            </form>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Welcome, <span id="officerName"></span>!</h1>
                <div class="user-info">
                    <span id="officerEmail"></span>
                    <span class="badge badge-officer">OFFICER</span>
                </div>
            </header>

            <div class="content-card">
                <h2>Officer Actions</h2>
                <p>Select an action to proceed.</p>
                <div class="quick-actions" style="display: flex; gap: 20px; margin-top: 20px;">
                    <a href="add-visitor.html" class="action-card" style="flex: 1; text-decoration: none; color: inherit;">
                        <div style="border: 1px solid #ddd; padding: 20px; border-radius: 8px; text-align: center;">
                            <div style="font-size: 40px;">➕</div>
                            <h3>Log New Visitor</h3>
                            <p>Register a new visitor into the system.</p>
                        </div>
                    </a>
                    <a href="visitorlist_officer.html" class="action-card" style="flex: 1; text-decoration: none; color: inherit;">
                        <div style="border: 1px solid #ddd; padding: 20px; border-radius: 8px; text-align: center;">
                            <div style="font-size: 40px;">📋</div>
                            <h3>View Visitor List</h3>
                            <p>See all visitor logs, check-out visitors, and manage records.</p>
                        </div>
                    </a>
                </div>
            </div>
        </main>
    </div>
    <script src="dashboard-script.js"></script>
</body>
</html>
