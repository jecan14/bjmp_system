<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Officers - BJMP Admin</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="nav-menu">
                <a href="admin-dashboard.html" class="nav-link"><span>📊</span> Dashboard</a>
                <a href="manage-officers.html" class="nav-link active"><span>👥</span> Manage Officers</a>
                <a href="manage-detainees.html" class="nav-link"><span>🔒</span> Manage Detainees</a>
                <a href="system-reports.html" class="nav-link"><span>📈</span> Reports</a>
            </nav>
            <div class="logout-form">
                <a href="logout.php" class="nav-link logout-btn"><span>🚪</span> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Manage Officers</h1>
            </header>

            <!-- Add Officer Form -->
            <div class="content-card">
                <h2>Add New Officer</h2>
                <form id="addOfficerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name <span class="required">*</span></label>
                            <input type="text" name="name" required>
                        </div>
                        <div class="form-group">
                            <label>Username <span class="required">*</span></label>
                            <input type="text" name="username" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>Contact Number <span class="required">*</span></label>
                            <input type="text" name="contact_number" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Password <span class="required">*</span></label>
                            <input type="password" name="password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Officer Account</button>
                </form>
            </div>

            <!-- Officer List -->
            <div class="content-card">
                <h2>Officer List</h2>
                <table class="data-table" id="officersTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Contact</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" class="no-data">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="manage-officers-script.js"></script>
</body>
</html>
