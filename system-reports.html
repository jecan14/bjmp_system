<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Reports - BJMP Admin</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="nav-menu">
                <a href="admin-dashboard.html" class="nav-link"><span>📊</span> Dashboard</a>
                <a href="manage-officers.html" class="nav-link"><span>👥</span> Manage Officers</a>
                <a href="manage-detainees.html" class="nav-link"><span>🔒</span> Manage Detainees</a>
                <a href="system-reports.html" class="nav-link active"><span>📈</span> Reports</a>
            </nav>
            <div class="logout-form">
                <a href="logout.php" class="nav-link logout-btn"><span>🚪</span> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>System Reports</h1>
            </header>

            <div class="content-card">
                <h2>Recent Visitor Logs</h2>
                <table class="data-table" id="visitorReportTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Visitor</th>
                            <th>Detainee</th>
                            <th>Logged By</th>
                            <th>Time In</th>
                            <th>Time Out</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" class="no-data">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="content-card">
                <h2>System Activity Logs</h2>
                <table class="data-table" id="activityLogTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>User</th>
                            <th>Action</th>
                            <th>Description</th>
                            <th>IP Address</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" class="no-data">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="system-reports-script.js"></script>
</body>
</html>
