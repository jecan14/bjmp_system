<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitors Log - BJMP Visitation System</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Officer Panel</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link">
                    <span>📊</span> Dashboard
                </a>
                <a href="add-visitor.html" class="nav-link">
                    <span>➕</span> Log Visitor
                </a>
                <a href="visitor-list.html" class="nav-link active">
                    <span>📋</span> Visitors Log
                </a>
                <a href="search-detainee.html" class="nav-link">
                    <span>🔍</span> Search Detainee
                </a>
                <a href="today-visitors.html" class="nav-link">
                    <span>📅</span> Today's Visitors
                </a>
            </nav>

            <div class="logout-form">
                <a href="logout.php" class="nav-link logout-btn">
                    <span>🚪</span> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Visitors Log</h1>
                <div class="header-actions">
                    <a href="add-visitor.html" class="btn btn-primary">+ Log New Visitor</a>
                </div>
            </header>

            <div id="alertContainer"></div>

            <!-- Search & Filter -->
            <div class="content-card">
                <div class="filter-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="searchInput" placeholder="Search visitor name, contact, ID..." style="flex: 2; min-width: 250px; padding: 10px; border: 2px solid #ddd; border-radius: 8px;">
                    
                    <input type="date" id="dateFilter" style="flex: 1; min-width: 150px; padding: 10px; border: 2px solid #ddd; border-radius: 8px;">
                    
                    <select id="detaineeFilter" style="flex: 1; min-width: 150px; padding: 10px; border: 2px solid #ddd; border-radius: 8px;">
                        <option value="">All Detainees</option>
                        <!-- Will be populated by JavaScript -->
                    </select>
                    
                    <button type="button" class="btn btn-primary" onclick="filterVisitors()">🔍 Search</button>
                    <button type="button" class="btn btn-secondary" onclick="clearFilters()">Clear</button>
                </div>
            </div>

            <!-- Visitors Table -->
            <div class="content-card">
                <h2>Visitor Records (<span id="recordCount">0</span>)</h2>

                <table class="data-table" id="visitorsTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Visitor's Name</th>
                            <th>Contact</th>
                            <th>Detainee</th>
                            <th>Relationship</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8" class="no-data">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="visitor-list-script.js"></script>
</body>
</html>
