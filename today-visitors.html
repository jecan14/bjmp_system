<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Visitors - BJMP Visitation System</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <script>
        function verifySession() {
            // Use 'no-cache' to ensure we get a fresh response from the server.
            fetch('session-check.php', { cache: 'no-cache' })
                .then(response => response.json())
                .then(data => {
                    if (!data.logged_in) {
                        // Use replace() to prevent the login page from being in the browser's history.
                        window.location.replace('login.html');
                    }
                })
                .catch(error => {
                    console.error('Session check failed, redirecting to login.', error);
                    window.location.replace('login.html');
                });
        }
        // The 'pageshow' event fires on initial load and when a page is restored from the back-forward cache.
        window.addEventListener('pageshow', verifySession);
    </script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Admin Panel</h2>
            </div>
            <nav class="nav-menu">
                <a href="admin-dashboard.html" class="nav-link"><span>📊</span> Dashboard</a>
                <a href="visitor-list.html" class="nav-link active"><span>📅</span> Manage Visitors</a>
                <a href="manage-officers.html" class="nav-link"><span>👥</span> Manage Officers</a>
                <a href="manage-detainees.html" class="nav-link"><span>🔒</span> Manage Individuals</a>
                <a href="system-reports.html" class="nav-link"><span>📈</span> Reports</a>
                
            </nav>
             <form action="logout.php" method="POST" class="logout-form">
                <button type="submit" class="logout-btn"><span>🚪</span> Logout</button>
            </form>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Today's Visitors</h1>
            </header>

            <div class="stats-grid">
                <div class="stat-card stat-card-green">
                    <div class="stat-icon">👤</div>
                    <div class="stat-info">
                        <h3>Currently Inside</h3>
                        <p class="stat-number" id="insideCount">0</p>
                    </div>
                </div>
            </div>

            <div class="content-card">
                <table class="data-table" id="todayTable">
                    <thead>
                        <tr>
                            <th>Time In</th>
                            <th>Visitor's Name</th>
                            <th>PDL's</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" class="no-data">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeLogoutModal">&times;</span>
            <h2>Confirm Logout</h2>
            <p>Are you sure you want to logout?</p>
            <div class="modal-actions">
                <button id="confirmLogoutBtn" class="btn btn-danger">Yes, Logout</button>
                <button id="cancelLogoutBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="today-visitors-script.js"></script>
    <script src="logout-modal-script.js"></script>
</body>
</html>
