<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Visitor Details - BJMP Visitation System</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <style>
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        .detail-item {
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .detail-item.full-width {
            grid-column: 1 / -1;
        }

        .detail-item label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .detail-item p {
            font-size: 16px;
            color: #2c3e50;
            margin: 0;
        }

        .detail-item small {
            color: #666;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Officer Panel</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link">
                    <span>📊</span> Dashboard
                </a>
                <a href="add-visitor.html" class="nav-link">
                    <span>➕</span> Log Visitor
                </a>
                <a href="visitorlist_officer.html" class="nav-link active">
                    <span>📋</span> Visitor Logs
                </a>
            </nav>

            <div class="logout-form">
                <a href="login.html" class="nav-link logout-btn">
                    <span>🚪</span> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Visitor Details</h1>
                <div class="header-actions" style="display: flex; gap: 10px;">
                    <a href="visitorlist_officer.html" class="btn btn-secondary">← Back</a>
                </div>
            </header>

            <div class="content-card">
                <div class="detail-grid" id="visitorDetails">
                    <!-- Will be populated by JavaScript -->
                </div>

                <div id="checkoutSection" class="form-actions" style="margin-top: 30px;">
                    <!-- Checkout button will appear here if not checked out -->
                </div>
            </div>
        </main>
    </div>
    <!-- dashboard-script.js is not directly needed here, it's for the dashboard page -->
    <!-- <script src="dashboard-script.js"></script> -->
    <script src="view-visitor-script.js?v=1.5"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('source') === 'admin') {
                // Update Sidebar for Admin
                const sidebar = document.querySelector('.sidebar');
                if (sidebar) {
                    sidebar.innerHTML = `
                        <div class="logo-container">
                            <img src="images/officer.png" alt="Logo" class="logo">
                            <h2>Admin Panel</h2>
                        </div>
                        <nav class="nav-menu">
                            <a href="admin-dashboard.html" class="nav-link"><span>📊</span> Dashboard</a>
                            <a href="visitor-list.html" class="nav-link active"><span>📅</span> Manage Visitors</a>
                            <a href="manage-officers.html" class="nav-link"><span>👥</span> Manage Officers</a>
                            <a href="manage-detainees.html" class="nav-link"><span>🔒</span> Manage Individuals</a>
                            <a href="system-reports.html" class="nav-link"><span>📈</span> Reports</a>
                        </nav>
                        <form action="logout.php" method="POST" class="logout-form"><button type="submit" class="logout-btn"><span>🚪</span> Logout</button></form>
                    `;
                }
                // Update Back Button
                const backBtn = document.querySelector('.header-actions .btn-secondary');
                if (backBtn) backBtn.href = 'visitor-list.html';
            }
        });
    </script>
</body>
</html>
