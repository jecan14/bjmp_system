<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="otp-style.css">
</head>
<body>
    <div class="auth-card">
        <h2>Forgot Password</h2>
        <p>Enter your email address to receive an OTP.</p>
        
        <div id="message" class="alert"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn-primary">Send OTP</button>
        </form>
        <p style="margin-top: 15px;"><a href="login.html" style="color: #666; text-decoration: none;">Back to Login</a></p>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = this.querySelector('button');
            const msg = document.getElementById('message');

            btn.disabled = true;
            btn.textContent = 'Sending...';
            msg.style.display = 'none';

            const formData = new FormData();
            formData.append('email', email);

            fetch('forgot-password-process.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // SIMULATION: Show OTP on screen for localhost testing
                    alert("LOCALHOST SIMULATION:\nYour OTP is: " + data.otp);
                    window.location.href = 'verify-otp.html?email=' + encodeURIComponent(email);
                } else {
                    msg.className = 'alert alert-danger';
                    msg.textContent = data.message;
                    msg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Send OTP';
                }
            });
        });
    </script>
</body>
</html>
