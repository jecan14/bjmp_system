<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor's Log - BJMP Visitation System</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <script>
        function verifySession() {
            // Use 'no-cache' to ensure we get a fresh response from the server.
            fetch('session-check.php', { cache: 'no-cache' })
                .then(response => response.json())
                .then(data => {
                    if (!data.logged_in) {
                        // Use replace() to prevent the login page from being in the browser's history.
                        window.location.replace('login.html');
                    }
                })
                .catch(error => {
                    console.error('Session check failed, redirecting to login.', error);
                    window.location.replace('login.html');
                });
        }
        // The 'pageshow' event fires on initial load and when a page is restored from the back-forward cache.
        window.addEventListener('pageshow', verifySession);
    </script>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Officer Panel</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M5.5 16a3.5 3.5 0 01-.369-6.98 4 4 0 117.738 0A3.5 3.5 0 0114.5 16h-9z"></path><path fill-rule="evenodd" d="M5 16.5a.5.5 0 01.5-.5h9a.5.5 0 010 1h-9a.5.5 0 01-.5-.5z" clip-rule="evenodd"></path></svg> Dashboard</a>
                <a href="add-visitor.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"></path></svg> Log Visitor</a>
                <a href="visitorlist_officer.html" class="nav-link active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg> Manage Visitors</a>
            </nav>

            <form action="logout.php" method="POST" class="logout-form">
                <button type="submit" class="logout-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M7.5 3.75A1.5 1.5 0 006 5.25v13.5a1.5 1.5 0 001.5 1.5h6a1.5 1.5 0 001.5-1.5V15a.75.75 0 011.5 0v3.75a3 3 0 01-3 3h-6a3 3 0 01-3-3V5.25a3 3 0 013-3h6a3 3 0 013 3V9A.75.75 0 0115 9V5.25a1.5 1.5 0 00-1.5-1.5h-6zm10.72 4.72a.75.75 0 011.06 0l3 3a.75.75 0 010 1.06l-3 3a.75.75 0 11-1.06-1.06l1.72-1.72H9a.75.75 0 010-1.5h10.94l-1.72-1.72a.75.75 0 010-1.06z" clip-rule="evenodd" /></svg> Logout</button>
            </form>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Visitor's Log</h1>
                <div class="header-actions">
                    <a href="add-visitor.html" class="btn btn-primary">+ Log New Visitor</a>
                </div>
            </header>

            <div id="alertContainer"></div>

            <!-- Search & Filter -->
            <div class="content-card">
                <div class="filter-group" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="searchInput" placeholder="Search visitor name, contact, ID..." style="flex: 2; min-width: 250px; padding: 10px; border: 2px solid #ddd; border-radius: 8px;">
                    
                    <input type="date" id="dateFilter" style="flex: 1; min-width: 150px; padding: 10px; border: 2px solid #ddd; border-radius: 8px;">
                    
                    <button type="button" class="btn btn-primary" onclick="filterVisitors()">🔍 Search</button>
                    <button type="button" class="btn btn-secondary" onclick="clearFilters()">Clear</button>
                </div>
            </div>

            <!-- Visitors Table -->
            <div class="content-card">
                <h2>Visitor's Records (<span id="recordCount">0</span>)</h2>

                <table class="data-table" id="visitorsTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Visitor's Name</th>
                            <th>Contact</th>
                            <th>PDL's Name</th>
                            <th>Relationship</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="8" class="no-data">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeLogoutModal">&times;</span>
            <h2>Confirm Logout</h2>
            <p>Are you sure you want to logout?</p>
            <div class="modal-actions">
                <button id="confirmLogoutBtn" class="btn btn-danger">Yes, Logout</button>
                <button id="cancelLogoutBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="visitor-list-script.js?v=1.5"></script>
    <script src="logout-modal-script.js"></script>
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
