<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log New Visitor - BJMP Visitation System</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <script>
        function verifySession() {
            // Use 'no-cache' to ensure we get a fresh response from the server.
            fetch('session-check.php', { cache: 'no-cache' })
                .then(response => response.json())
                .then(data => {
                    if (!data.logged_in) {
                        // Use replace() to prevent the login page from being in the browser's history.
                        window.location.replace('login.html');
                    }
                })
                .catch(error => {
                    console.error('Session check failed, redirecting to login.', error);
                    window.location.replace('login.html');
                });
        }
        // The 'pageshow' event fires on initial load and when a page is restored from the back-forward cache.
        window.addEventListener('pageshow', verifySession);
    </script>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Officer Panel</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link">
                    <span>📊</span> Dashboard
                </a>
                <a href="add-visitor.html" class="nav-link active">
                    <span>➕</span> Log Visitor
                </a>
                <a href="visitorlist_officer.html" class="nav-link">
                    <span>📋</span> Manage Visitors
                </a>
            </nav>

            <form action="logout.php" method="POST" class="logout-form">
                <button type="submit" class="logout-btn"><span>🚪</span> Logout</button>
            </form>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <h1>Log New Visitor</h1>
            </header>

            <div id="alertContainer"></div>

            <div class="content-card">
                <form id="addVisitorForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="visitorName">Visitor's Name <span class="required">*</span></label>
                            <input type="text" id="visitorName" name="visitor_name" required>
                        </div>

                        <div class="form-group">
                            <label for="visitorId">ID Number <span class="required">*</span></label>
                            <input type="text" id="visitorId" name="visitor_id_number" placeholder="Driver's License, National ID, etc.">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="visitorContact">Contact Number <span class="required">*</span></label>
                            <input type="tel" id="visitorContact" name="visitor_contact" required placeholder="">
                        </div>

                        <div class="form-group">
                            <label for="relationship">Relationship to Individual <span class="required">*</span></label>
                            <select id="relationship" name="relationship" required>
                                <option value="">Select Relationship</option>
                                <option value="Spouse">Spouse</option>
                                <option value="Parent">Mother</option>
                                <option value="Parent">Father</option>
                                <option value="Child">Child</option>
                                <option value="Sibling">Sibling</option>
                                <option value="Relative">Relative</option>
                                <option value="Friend">Friend</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="detaineeName">Name of Individual to visit<span class="required">*</span></label>
                        <input type="text" id="detaineeName" name="detainee_name" required placeholder="">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="visitDate"> Date <span class="required">*</span></label>
                            <input type="date" id="visitDate" name="visit_date" required>
                        </div>

                        <div class="form-group">
                            <label for="visitTime"> Time <span class="required">*</span></label>
                            <input type="time" id="visitTime" name="visit_time" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="notes">Notes / Remarks</label>
                        <textarea id="notes" name="notes" rows="4" placeholder=""></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">✓ Log Visitor</button>
                        <a href="visitorlist_officer.html" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="add-visitor-script.js?v=1.2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dateInput = document.getElementById('visitDate');
            const timeInput = document.getElementById('visitTime');

            if (!dateInput || !timeInput) return;

            function updateTimeConstraints() {
                const now = new Date();
                
                // Format Date: YYYY-MM-DD
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const today = `${year}-${month}-${day}`;

                // Format Time: HH:MM
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const currentTime = `${hours}:${minutes}`;

                // Set min date to today
                dateInput.min = today;
                if (!dateInput.value) dateInput.value = today;

                // If selected date is today, restrict time
                if (dateInput.value === today) {
                    timeInput.min = currentTime;
                    // If current value is empty or less than min, update it
                    if (!timeInput.value || timeInput.value < currentTime) {
                        timeInput.value = currentTime;
                    }
                } else {
                    timeInput.removeAttribute('min');
                }
            }

            // Initialize and add listeners
            updateTimeConstraints();
            dateInput.addEventListener('change', updateTimeConstraints);
            
            // Update every minute to keep 'now' accurate
            setInterval(updateTimeConstraints, 60000);
            
            // Ensure validity on input
            timeInput.addEventListener('input', function() {
                if (this.min && this.value < this.min) {
                    this.value = this.min;
                }
            });
        });
    </script>
</body>
</html>
