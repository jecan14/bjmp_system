<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Detainee - BJMP Visitation System</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <script>
        function verifySession() {
            // Use 'no-cache' to ensure we get a fresh response from the server.
            fetch('session-check.php', { cache: 'no-cache' })
                .then(response => response.json())
                .then(data => {
                    if (!data.logged_in) {
                        // Use replace() to prevent the login page from being in the browser's history.
                        window.location.replace('login.html');
                    }
                })
                .catch(error => {
                    console.error('Session check failed, redirecting to login.', error);
                    window.location.replace('login.html');
                });
        }
        // The 'pageshow' event fires on initial load and when a page is restored from the back-forward cache.
        window.addEventListener('pageshow', verifySession);
    </script>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Officer Panel</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M5.5 16a3.5 3.5 0 01-.369-6.98 4 4 0 117.738 0A3.5 3.5 0 0114.5 16h-9z"></path><path fill-rule="evenodd" d="M5 16.5a.5.5 0 01.5-.5h9a.5.5 0 010 1h-9a.5.5 0 01-.5-.5z" clip-rule="evenodd"></path></svg> Dashboard</a>

                <a href="visitorlist_officer.html" class="nav-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg> Manage Visitors</a>

        <main class="main-content">
            <header class="header">
                <h1>Search Detainee</h1>
            </header>

            <div class="content-card">
                <div class="form-group">
                    <input type="text" id="detaineeSearch" placeholder="Enter detainee name or number..." style="padding: 15px; font-size: 16px;">
                </div>
            </div>

            <div class="content-card">
                <h2>Search Results</h2>
                <table class="data-table" id="detaineeTable">
                    <thead>
                        <tr>
                            <th>Detainee No.</th>
                            <th>Name</th>
                            <th>Date of Birth</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                        <tr><td colspan="5" class="no-data">Enter a search term above</td></tr>
                    </tbody>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="modal">
        <div class="modal-content">

            <div class="modal-actions">

                <button id="cancelLogoutBtn" class="btn btn-secondary">Cancel</button>

        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
