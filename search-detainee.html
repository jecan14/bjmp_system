<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Detainee - BJMP Visitation System</title>
    <link rel="stylesheet" href="dashboard-style.css">
    <script>
        function verifySession() {
            // Use 'no-cache' to ensure we get a fresh response from the server.
            fetch('session-check.php', { cache: 'no-cache' })
                .then(response => response.json())
                .then(data => {
                    if (!data.logged_in) {
                        // Use replace() to prevent the login page from being in the browser's history.
                        window.location.replace('login.html');
                    }
                })
                .catch(error => {
                    console.error('Session check failed, redirecting to login.', error);
                    window.location.replace('login.html');
                });
        }
        // The 'pageshow' event fires on initial load and when a page is restored from the back-forward cache.
        window.addEventListener('pageshow', verifySession);
    </script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="images/officer.png" alt="Logo" class="logo">
                <h2>Officer Panel</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><span>📊</span> Dashboard</a>
                <a href="add-visitor.html" class="nav-link"><span>➕</span> Log Visitor</a>
                <a href="visitorlist_officer.html" class="nav-link"><span>📋</span> Visitor List</a>
                <a href="search-detainee.html" class="nav-link active"><span>🔍</span> Search Detainee</a>
            </nav>
            <form action="logout.php" method="POST" class="logout-form">
                <button type="submit" class="logout-btn"><span>🚪</span> Logout</button>
            </form>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Search Detainee</h1>
            </header>

            <div class="content-card">
                <div class="form-group">
                    <input type="text" id="detaineeSearch" placeholder="Enter detainee name or number..." style="padding: 15px; font-size: 16px;">
                </div>
            </div>

            <div class="content-card">
                <h2>Search Results</h2>
                <table class="data-table" id="detaineeTable">
                    <thead>
                        <tr>
                            <th>Detainee No.</th>
                            <th>Name</th>
                            <th>Date of Birth</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" class="no-data">Enter a search term above</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="search-detainee-script.js"></script>
</body>
</html>
